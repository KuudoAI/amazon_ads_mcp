name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  # ---------- Smoke gate ------------------------------------------------
  # Fails the whole CI in seconds when something fundamental is broken
  # (server module won't import, settings can't construct from env,
  # resilience primitives misbehave). Runs on a single Python version
  # since smoke checks the integration surface, not Python compatibility.
  smoke:
    name: Smoke gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv sync --frozen
      - name: Run smoke lane
        env:
          MCP_TEST_COMPAT: "true"
        run: |
          uv run pytest -q -m smoke

  tests:
    needs: smoke
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: |
          uv sync --frozen

      - name: Check server.json registry metadata
        run: |
          python scripts/sync_server_json.py --check

      - name: Syntax compile check
        run: |
          python -W error::SyntaxWarning -m compileall -q src tests

      # Coverage ratchet history:
      #   - Baseline (round 8): 69% (11668 stmts), floor at 65.
      #   - Round 11: ratcheted to 67.
      #   - Round 13: ratcheted to 68 (property tests pushed to 69.02%).
      #   - Round 15: ratcheted to 70 (sampling+security pushed to 70.47%).
      #   - Round 17: ratcheted to 72 (openapi loader, media negotiator,
      #     response wrapper, http/request pushed to 72.04%). Latent prod
      #     bug fixed in TokenBucket.acquire (back-pressure ordering)
      #     surfaced when round-16 tests pushed full-suite runtime past
      #     deadline-race threshold.
      #   - Round 18: ratcheted to 76 after auth-middleware helpers,
      #     token_store extras, resilient_client + scope-cleanup omit
      #     list (tool_audit/, __main__.py, html_templates.py — pure dev
      #     tooling and non-functional scope). Measured 76.42%. Latent
      #     bug pinned in test_auth_middleware_helpers: openbridge
      #     load_from_env clobbers verify_signature/iss/aud.
      #   - Round 19: ratcheted to 77 after transform_executor_helpers
      #     (62 tests, 45%→~75% on that module). Measured 77.20%.
      #     Surfaced 4th latent issue: _coerce_iso_to_epoch_ms YYYYMMDD
      #     branch is dead code. All 6 latent issues now consolidated in
      #     docs/audit/latent-issues.md (don't lose them in test comments).
      #   - Threshold lives ONLY in CI; local TDD addopts intentionally
      #     do not enforce coverage so the dev loop stays fast.
      #   - Long-term target: 80%.
      - name: Run tests (fast suite + coverage)
        env:
          MCP_TEST_COMPAT: "true"
        run: |
          uv run pytest -q -m "not slow and not smoke" \
            --cov=src/amazon_ads_mcp \
            --cov-report=term-missing:skip-covered \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=77

      - name: Upload coverage artifact
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: warn
          retention-days: 7

  # ----- report_fields catalog gates (adsv1.md §F.1) --------------------
  #
  # Drift + idempotency jobs intentionally live OUTSIDE public CI: they
  # require the source dimension/metric specs under .build/adsv1_specs/,
  # which is a private input directory excluded from this repo. Run those
  # checks locally before publishing a refreshed catalog. The negative-
  # path gate below uses a public pathological fixture and remains in CI
  # as the validator-of-validator.

  catalog-negative:
    name: report_fields refresh negative-path
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv sync --frozen
      - name: Assert refresh fails on pathological fixture
        run: |
          set +e
          uv run python -m amazon_ads_mcp.build.refresh_v1_catalog \
            --source tests/fixtures/adsv1_catalog_pathological \
            --dest /tmp/negative \
            --validate
          rc=$?
          if [ "$rc" = "0" ]; then
            echo "expected non-zero exit on pathological source"
            exit 1
          fi
          echo "negative-path exit code: $rc (ok)"

  wheel-smoke:
    name: report_fields wheel smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv sync --frozen
      - name: Run slow-marker suite (wheel-content + smoke)
        run: |
          uv run pytest -q -m slow

  # ----- Metering conformance (Task 22) ----------------------------------
  #
  # mcp-outbound-metering is a git dependency on the PRIVATE KuudoAI/billing
  # repo (pyproject.toml [tool.uv.sources], python_version >= '3.12' only)
  # -- `uv sync` needs authenticated git access to fetch it, hence the
  # BILLING_REPO_TOKEN secret + git insteadOf step below. Python 3.12 only:
  # every tests/metering/ test is skipif-guarded to <3.12, and
  # mcp-outbound-metering itself is never installed below 3.12 (the repo's
  # own floor stays 3.10 -- see the `tests` job's matrix above, untouched).
  metering:
    name: Metering conformance (Task 22)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Fail loudly and early, before `uv sync` turns a missing secret
      # into a confusing git-auth error. NOTE (operator action required):
      # BILLING_REPO_TOKEN must be provisioned as a repo/org secret -- a
      # GitHub PAT (classic or fine-grained) with at least read access to
      # KuudoAI/billing. This job cannot run without it.
      - name: Verify BILLING_REPO_TOKEN is provisioned
        env:
          BILLING_REPO_TOKEN: ${{ secrets.BILLING_REPO_TOKEN }}
        run: |
          if [ -z "$BILLING_REPO_TOKEN" ]; then
            echo "::error::BILLING_REPO_TOKEN secret is not set. mcp-outbound-metering is pulled from the private KuudoAI/billing repo via a git dependency (pyproject.toml [tool.uv.sources]), and 'uv sync' needs authenticated git access to fetch it. Provision a GitHub token (read access to KuudoAI/billing) as the BILLING_REPO_TOKEN repository/organization secret."
            exit 1
          fi

      - name: Configure git auth for the private billing repo
        env:
          BILLING_REPO_TOKEN: ${{ secrets.BILLING_REPO_TOKEN }}
        run: |
          git config --global url."https://x-access-token:${BILLING_REPO_TOKEN}@github.com/KuudoAI/billing".insteadOf "https://github.com/KuudoAI/billing"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies (metering extra resolved on 3.12)
        run: |
          uv sync --frozen --python 3.12

      - name: Run metering test suite
        env:
          MCP_TEST_COMPAT: "true"
        run: |
          uv run pytest tests/metering -q

      # Conformance-only fakes (integration guide §4's CI environment
      # block, adapted to this repo's provider/host) -- never a real
      # credential or endpoint. --skip-ingest: no real edge/ingest
      # endpoint exists yet for this integration (registration/activation
      # is a separate, later, edge-side step per design §3.5.6).
      #
      # DEPLOYMENT NOTE (fix round 1, MINOR): a single NA host is
      # sufficient here -- this step only exercises the conformance
      # suite's mock upstream, never real regional traffic. A REAL
      # production METERING_UPSTREAM_HOSTS value must list all three
      # Amazon Ads regional hosts (advertising-api.amazon.com, -eu, -fe;
      # plus the "-test" sandbox variants if AMAZON_ADS_SANDBOX_MODE is
      # used) -- see metering.yaml's own comment. With
      # disallowed_host_action: reject, a production value listing only
      # the NA host would reject every EU/FE request outright.
      - name: mcp-metering verify
        env:
          METERING_ENABLED: "true"
          METERING_UPSTREAM_HOSTS: "advertising-api.amazon.com"
          METERING_UPSTREAM_SERVICE: "amazon_ads"
          METERING_ENDPOINT: "https://ingest.example-metering.test/v1/usage/batches"
          METERING_DEPLOYMENT_ID: "ci"
          METERING_INSTANCE_ID: "ci-1"
          METERING_KEY_ID: "ci-key-placeholder"
          METERING_HMAC_SECRET: "ci-secret-placeholder"
          METERING_OUTBOX_MAX_BYTES: "10000000"
        run: |
          uv run mcp-metering verify --config metering.yaml \
            --harness amazon_ads_mcp.metering.conformance:create_conformance_harness \
            --skip-ingest
